<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(
        135deg,
        #ffe5ec,
        #ffd6e8,
        #f3d9ff
    );
    position:relative;
}

.container{
    text-align:center;
    z-index:10;
    padding:40px;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    color:#c2185b;
    margin-bottom:20px;
}

.subtitle{
    font-size:1.2rem;
    color:#7a4a6a;
    margin-bottom:40px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:1.2rem;
    cursor:pointer;
    transition:all 0.3s ease;
    font-weight:600;
}

#yesBtn{
    background:#ff4f8b;
    color:white;
    box-shadow:0 10px 25px rgba(255,79,139,.3);
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    position:absolute;
    background:white;
    color:#ff4f8b;
    border:2px solid #ff4f8b;
}

.message{
    margin-top:30px;
    color:#c2185b;
    font-size:1.3rem;
    line-height:1.7;
}

/* Floating hearts */
.heart{
    position:absolute;
    color:#ff80ab;
    animation:float 8s linear infinite;
    opacity:.6;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>💍 Will You Marry Me?</h1>

    <div class="subtitle">
        Every moment with you feels like magic ✨<br>
        I want to spend all my tomorrows with you ❤️
    </div>

    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 🙈</button>

    <div id="message" class="message"></div>
</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

function moveButton() {
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            background:linear-gradient(135deg,#ffe5ec,#ffd6e8,#f3d9ff);
            padding:30px;
            font-family:Poppins,sans-serif;
        ">
            <div style="font-size:5rem;">💖</div>

            <h1 style="
                color:#c2185b;
                margin-bottom:20px;
                font-family:'Playfair Display',serif;
            ">
                You Said YES! ✨
            </h1>

            <p style="
                max-width:700px;
                color:#6d3f5b;
                font-size:1.4rem;
                line-height:1.8;
            ">
                Today is one of the happiest days of my life.
                <br><br>
                I promise to love you, support you,
                make you laugh when you're sad,
                celebrate your victories,
                and stand beside you through every chapter of life.
                <br><br>
                Here's to our forever ❤️
            </p>

            <h2 style="
                margin-top:30px;
                color:#ff4f8b;
            ">
                💍 Forever Starts Today 💍
            </h2>
        </div>
    `;
});

moveButton();

/* Floating Hearts */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20+15)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
